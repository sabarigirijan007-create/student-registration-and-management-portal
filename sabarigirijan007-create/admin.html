<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <h2>CCET</h2>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="manage-students.html">Manage Students</a></li>
        </ul>
    </nav>
    <div class="form-container" id="loginSection">
        <h2>Admin Login</h2>
        <form id="adminLoginForm">
            <input type="text"
                   id="adminUsername"
                   placeholder="Username"
                   required>
            <input type="password"
                   id="adminPassword"
                   placeholder="Password"
                   required>
            <button type="submit">Login</button>
        </form>

    </div>
    <div class="form-container" id="dashboardSection" style="display:none;">

        <h2>Admin Dashboard</h2>

        <h3>Total Registered Students</h3>

        <h1 id="totalStudents">0</h1>

        <br>

        <a href="manage-students.html" class="btn">
            Manage Students
        </a>

    </div>

    <footer>
        <p>© 2026 Student Registration Management System</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
